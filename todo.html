<!DOCTYPE html>
<html>
<head>
<title>To-Do List</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    width:350px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

h2{
    text-align:center;
    color:green;
}

input{
    width:70%;
    padding:10px;
    font-size:16px;
}

button{
    padding:10px 15px;
    font-size:16px;
    cursor:pointer;
}

ul{
    list-style:none;
    padding:0;
}

li{
    background:#e8e8e8;
    margin-top:10px;
    padding:10px;
    border-radius:5px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.delete{
    background:red;
    color:white;
    border:none;
    padding:5px 10px;
    border-radius:5px;
}

a{
    text-decoration:none;
    display:block;
    text-align:center;
    margin-top:20px;
    color:blue;
}
</style>

</head>

<body>

<div class="container">

<h2>📝 My To-Do List</h2>

<input type="text" id="task" placeholder="Enter a task">
<button onclick="addTask()">Add</button>

<ul id="list"></ul>

<a href="index.html">⬅ Back to Portfolio</a>

</div>

<script>

function addTask(){

var task=document.getElementById("task").value;

if(task==""){
alert("Please enter a task");
return;
}

var li=document.createElement("li");

li.innerHTML=
task+
' <button class="delete" onclick="removeTask(this)">Delete</button>';

document.getElementById("list").appendChild(li);

document.getElementById("task").value="";

}

function removeTask(button){

button.parentElement.remove();

}

</script>

</body>
</html>
